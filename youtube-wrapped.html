<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Wrapped Preview</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Extra opmaak speciaal voor de afbeeldingen */
        .gallery img {
            max-width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border: 1px solid #eaeaea;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 30px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .back-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="index.html" class="back-btn">⬅ Terug naar overzicht</a>

        <header>
            <h1>YouTube Wrapped Preview</h1>
            <p>Omdat dit project niet live staat, zie je hier een aantal screenshots van de applicatie in actie!</p>
        </header>

        <div class="gallery">
            <img src="wrapped1.png" alt="YouTube Wrapped Screenshot 1">
            <img src="wrapped2.png" alt="YouTube Wrapped Screenshot 2">
        </div>
    </div>
</body>

</html>
